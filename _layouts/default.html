<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ page.title }} | Octaloop</title>
  <meta name="description" content="{{ page.description | default: site.description }}"/>
  <link rel="icon" href="{{ site.baseurl }}/assets/images/wp-content/uploads/2023/09/cropped-Favicon-32x32.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292e; }

    .page-header {
      background-color: #159957;
      background-image: linear-gradient(120deg, #155799, #159957);
      color: #fff;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin: 0 0 0.5rem; }
    .page-header p { margin: 0; font-size: 1.05rem; color: rgba(255,255,255,0.85); }

    .main-content { max-width: 1160px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    .site-footer {
      background: #155799;
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
    }
    .site-footer a { color: rgba(255,255,255,0.9); margin: 0 8px; }
  </style>
  {{ page.head_extra }}
</head>
<body>

<header class="page-header">
  <h1>{{ page.title }}</h1>
  {% if page.description %}<p>{{ page.description }}</p>{% endif %}
</header>

<main class="main-content">
  {{ content }}
</main>

<footer class="site-footer">
  <a href="{{ site.baseurl }}/">Octaloop</a>
  <a href="{{ site.baseurl }}/blog/">Blog</a>
  <a href="{{ site.baseurl }}/events/">Events</a>
  <a href="{{ site.baseurl }}/contact-us/">Contact Us</a>
</footer>

</body>
</html>
