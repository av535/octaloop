<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }} | Octaloop</title>
  <meta name="description" content="{{ page.description | default: site.description }}"/>
  <link rel="icon" href="{{ site.baseurl }}/assets/images/wp-content/uploads/2023/09/cropped-Favicon-32x32.png" sizes="32x32"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/theme.css"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/fontawesome.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    /* ── Journal / Blog shared styles ── */
    body { background: #f4f4f4; }
    .octa-nav {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .octa-nav .nav-logo img { height: 36px; width: auto; }
    .octa-nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 8px; align-items: center; }
    .octa-nav ul li a {
      color: #111;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .octa-nav ul li a:hover { background: #f4f4f4; color: #111; }
    .octa-nav ul li a.btn-contact {
      background: #111;
      color: #fff;
      border-radius: 8px;
      padding: 7px 18px;
    }
    .octa-nav ul li a.btn-contact:hover { background: #ffb001; color: #111; }
    .octa-nav .ham-nav { display: none; }

    footer#footer-call {
      background: #111;
      color: #fff;
      padding: 48px 32px 32px;
      margin-top: 80px;
    }
    footer#footer-call .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: space-between;
    }
    footer#footer-call ul { list-style: none; padding: 0; margin: 0; }
    footer#footer-call ul li { margin-bottom: 8px; }
    footer#footer-call ul li a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    footer#footer-call ul li a:hover { color: #ffb001; }
    footer#footer-call .social-media { display: flex; gap: 16px; margin-top: 12px; }
    footer#footer-call .social-media li a { color: #aaa; font-size: 1.1rem; }
    footer#footer-call .social-media li a:hover { color: #ffb001; }
    footer#footer-call .social-media img { filter: brightness(0.7); transition: filter 0.15s; }
    footer#footer-call .social-media li a:hover img { filter: brightness(1); }

    @media (max-width: 768px) {
      .octa-nav { padding: 12px 16px; }
      .octa-nav ul { display: none; }
      .octa-nav .ham-nav { display: block; cursor: pointer; font-size: 1.4rem; color: #111; }
    }
  </style>
  {{ page.head_extra }}
</head>
<body>

<!-- Nav -->
<nav class="octa-nav">
  <div class="nav-logo">
    <a href="{{ site.baseurl }}/"><img alt="Octaloop" src="{{ site.baseurl }}/assets/images/wp-content/themes/octaloop/assets/images/Logo.png"/></a>
  </div>
  <ul>
    <li><a href="{{ site.baseurl }}/events/">Events</a></li>
    <li><a href="{{ site.baseurl }}/services/">Services</a></li>
    <li><a href="{{ site.baseurl }}/journal/">Journal</a></li>
    <li><a href="{{ site.baseurl }}/about-us/">About Us</a></li>
    <li><a href="{{ site.baseurl }}/contact-us/" class="btn-contact">Contact Us</a></li>
  </ul>
  <span class="ham-nav" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">&#9776;</span>
  <ul class="mobile-menu" style="display:none;position:absolute;top:65px;left:0;right:0;background:#fff;flex-direction:column;padding:16px 32px;border-bottom:1px solid #e8e8e8;gap:0;">
    <li><a href="{{ site.baseurl }}/events/" style="display:block;padding:10px 0;">Events</a></li>
    <li><a href="{{ site.baseurl }}/services/" style="display:block;padding:10px 0;">Services</a></li>
    <li><a href="{{ site.baseurl }}/journal/" style="display:block;padding:10px 0;">Journal</a></li>
    <li><a href="{{ site.baseurl }}/about-us/" style="display:block;padding:10px 0;">About Us</a></li>
    <li><a href="{{ site.baseurl }}/contact-us/" style="display:block;padding:10px 0;">Contact Us</a></li>
  </ul>
</nav>

{{ content }}

<!-- Footer -->
<footer id="footer-call">
  <div class="footer-inner">
    <div>
      <a href="{{ site.baseurl }}/"><img alt="Octaloop" src="{{ site.baseurl }}/assets/images/wp-content/themes/octaloop/assets/images/Logo-white.png" height="36" style="height:36px;width:auto;margin-bottom:16px;"/></a>
      <ul class="social-media">
        <li><a href="https://www.instagram.com/octaloop_hq/" target="_blank"><i class="fab fa-instagram"></i></a></li>
        <li><a href="https://twitter.com/octaloopHQ" target="_blank"><img style="width:16px;height:16px;" src="{{ site.baseurl }}/assets/images/wp-content/themes/octaloop/assets/images/x-social-media-icon.png" alt="X"/></a></li>
        <li><a href="https://t.me/octaloophq" target="_blank"><i class="fab fa-telegram"></i></a></li>
        <li><a href="https://www.youtube.com/channel/UCOXSWSyY65YzU2kMV7A4s0w" target="_blank"><i class="fab fa-youtube"></i></a></li>
        <li><a href="https://www.linkedin.com/company/10387115/" target="_blank"><i class="fab fa-linkedin"></i></a></li>
        <li><a href="https://www.facebook.com/Octaloop-100192491368630" target="_blank"><i class="fab fa-facebook-f"></i></a></li>
      </ul>
    </div>
    <div>
      <ul>
        <li><a href="{{ site.baseurl }}/termsandconditions.html">Terms &amp; Conditions</a></li>
        <li><a href="{{ site.baseurl }}/privacypolicy.html">Privacy Policy</a></li>
      </ul>
    </div>
    <div>
      <ul>
        <li><a href="{{ site.baseurl }}/journal/">Journal</a></li>
        <li><a href="{{ site.baseurl }}/about-us/">About Us</a></li>
        <li><a href="{{ site.baseurl }}/services/">Services</a></li>
        <li><a href="{{ site.baseurl }}/events/">Events</a></li>
        <li><a href="{{ site.baseurl }}/contact-us/">Contact Us</a></li>
      </ul>
    </div>
  </div>
</footer>

<script src="{{ site.baseurl }}/assets/js/jquery.min.js" defer></script>
</body>
</html>
